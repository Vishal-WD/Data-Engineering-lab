services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: adventureworks-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "1234"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data: